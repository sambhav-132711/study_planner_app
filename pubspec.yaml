name: study_planner_app

description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3


dependencies:

  flutter:
    sdk: flutter

  ## LOCALIZATION SUPPORT
  flutter_localizations:
    sdk: flutter

  ## INTERNATIONALIZATION
  intl: ^0.20.2
  ## ICONS
  cupertino_icons: ^1.0.8

  ## LOCAL DATABASE
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  ## UI PACKAGES
  percent_indicator: ^4.2.5
  circular_countdown_timer: ^0.2.4
  table_calendar: ^3.2.0
  fl_chart: ^0.68.0

  ## FIREBASE
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0

  ## GOOGLE SIGN IN
  google_sign_in: ^6.2.1

  ## PROFILE IMAGE
  image_picker: ^1.1.2

  ## LOCAL NOTIFICATIONS
  flutter_local_notifications: ^17.2.1

  ## TIMEZONE SUPPORT
  timezone: ^0.9.4


dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:

    - assets/images/meeting.jpg

    - assets/images/google_logo.png